<div class="card-container">
  <img [src]="game().imageUrl" alt="image" />
  <h3>{{ game().title }}</h3>
  <button (click)="voteGame()">Vote</button>
  <p>{{ game().description }}</p>
  <button (click)="saveToWishlist()">Save to wishlist</button><br />
  <button (click)="addToCart()">Add to cart</button>

  <div>
    Leave a review
    <input type="text" [(ngModel)]="review" />
    <!-- Two-way data binding for the review input -> [()] -->
    <button (click)="clearReview()">Clear</button>
  </div>
</div>
